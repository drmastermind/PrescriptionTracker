<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrescriptionTracker - Dev UI</title>
<style>
:root {
  --bg:#0f1117; --surface:#1a1d2e; --surface2:#252840; --border:#2e3150;
  --accent:#7c6af5; --accent-dark:#5c4ed4; --text:#e8eaf0; --muted:#7a7d9a;
  --success:#3dd68c; --warn:#f5a623; --danger:#e05252;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* Header */
header{background:var(--surface2);padding:12px 24px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--border)}
header h1{font-size:1.1rem;font-weight:600;letter-spacing:.3px;flex:1}
#conn-status{font-size:.75rem;padding:3px 10px;border-radius:20px;background:#1a3a2a;color:var(--success);border:1px solid #2a5a3a}
#conn-status.err{background:#3a1a1a;color:var(--danger);border-color:#5a2a2a}
#conn-status.wait{background:#3a3010;color:var(--warn);border-color:#5a4a10}

/* Nav */
nav{background:var(--surface);padding:6px 24px;display:flex;gap:4px;border-bottom:1px solid var(--border)}
.tab{padding:7px 18px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:6px;font-size:.87rem;transition:.15s}
.tab:hover{background:var(--surface2);color:var(--text)}
.tab.on{background:var(--accent);color:#fff;font-weight:500}

/* Layout */
main{padding:20px 24px;max-width:1400px;margin:0 auto}
.panel{display:none}.panel.on{display:block}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.toolbar input,.toolbar select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 11px;border-radius:6px;font-size:.85rem;outline:none}
.toolbar input:focus,.toolbar select:focus{border-color:var(--accent)}

/* Buttons */
.btn{padding:7px 14px;border:none;border-radius:6px;cursor:pointer;font-size:.83rem;transition:.15s;font-weight:500}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:var(--accent-dark)}
.btn-d{background:var(--danger);color:#fff;opacity:.85}.btn-d:hover{opacity:1}
.btn-w{background:#7a5010;color:#f0c060}.btn-w:hover{background:#9a6820}
.btn-g{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-g:hover{background:var(--border)}
.btn-sm{padding:3px 9px;font-size:.77rem}

/* Table */
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.84rem}
th{background:var(--surface2);color:var(--muted);padding:9px 12px;text-align:left;font-weight:500;white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.acts{display:flex;gap:5px;align-items:center}

/* Badges */
.badge{padding:2px 8px;border-radius:10px;font-size:.73rem;font-weight:500}
.bg-ok{background:#0a2a18;color:var(--success)}
.bg-off{background:#222;color:var(--muted)}
.bg-admin{background:#2a1a50;color:#a080f8}
.bg-normal{background:#101830;color:#60a0e8}

/* Pagination */
.pager{display:flex;gap:6px;align-items:center;margin-top:12px;justify-content:flex-end;font-size:.82rem;color:var(--muted)}
.pager button{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:5px;cursor:pointer;font-size:.8rem}
.pager button:disabled{opacity:.35;cursor:not-allowed}
.pager button.cur{background:var(--accent);border-color:var(--accent);color:#fff}

/* Modal */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;align-items:center;justify-content:center}
#overlay.on{display:flex}
#mbox{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px;width:520px;max-height:92vh;overflow-y:auto}
#mbox h2{font-size:1rem;font-weight:600;margin-bottom:18px}
.fr{margin-bottom:12px}
.fr label{display:block;font-size:.77rem;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.fr input,.fr select,.fr textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 11px;border-radius:6px;font-size:.87rem}
.fr input:focus,.fr select:focus,.fr textarea:focus{outline:none;border-color:var(--accent)}
.fr textarea{resize:vertical;min-height:60px;font-family:inherit}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mfooter{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}

/* Toast */
#toast{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.t-item{padding:10px 16px;border-radius:7px;font-size:.83rem;max-width:340px;animation:tin .25s}
.t-ok{background:#0e2a1a;border:1px solid #1a5a30;color:#60e898}
.t-err{background:#2a0e0e;border:1px solid #6a2020;color:#f08080}
.t-info{background:var(--surface2);border:1px solid var(--border);color:var(--text)}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.empty{text-align:center;padding:40px;color:var(--muted)}
hr{border:none;border-top:1px solid var(--border);margin:10px 0}
.sec{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
</style>
</head>
<body>

<header>
  <h1>PrescriptionTracker &mdash; Dev UI</h1>
  <span id="conn-status" class="wait">Connecting...</span>
</header>

<nav>
  <button class="tab" onclick="showTab('users')">Users</button>
  <button class="tab" onclick="showTab('meds')">Medications</button>
  <button class="tab" onclick="showTab('rxs')">Prescriptions</button>
</nav>

<main>

<!-- USERS -->
<div id="panel-users" class="panel">
  <div class="toolbar">
    <button class="btn btn-p" onclick="openCreateUser()">+ New User</button>
    <label style="color:var(--muted);font-size:.83rem;margin-left:auto">
      <input type="checkbox" id="show-inactive-users" onchange="loadUsers()"> Show inactive
    </label>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>ID</th><th>Display Name</th><th>Login Name</th><th>Email</th>
        <th>Role</th><th>Active</th><th>Actions</th>
      </tr></thead>
      <tbody id="users-tbody"><tr><td colspan="7" class="empty">Loading...</td></tr></tbody>
    </table>
  </div>
  <div class="pager" id="users-pager"></div>
</div>

<!-- MEDICATIONS -->
<div id="panel-meds" class="panel">
  <div class="toolbar">
    <button class="btn btn-p" onclick="openCreateMed()">+ New Medication</button>
    <input id="med-search" placeholder="Search by name..." oninput="debounceSearch()" style="width:220px">
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>ID</th><th>Medication Name</th><th>Generic Name</th>
        <th>Strength</th><th>Form</th><th>Brand Name</th><th>Actions</th>
      </tr></thead>
      <tbody id="meds-tbody"><tr><td colspan="7" class="empty">Loading...</td></tr></tbody>
    </table>
  </div>
  <div class="pager" id="meds-pager"></div>
</div>

<!-- PRESCRIPTIONS -->
<div id="panel-rxs" class="panel">
  <div class="toolbar">
    <button class="btn btn-p" onclick="openCreateRx()">+ New Prescription</button>
    <select id="rx-user-filter" onchange="loadRxs(1)" style="width:160px">
      <option value="">All Users</option>
    </select>
    <select id="rx-active-filter" onchange="loadRxs(1)">
      <option value="">All</option>
      <option value="true">Active only</option>
      <option value="false">Inactive only</option>
    </select>
    <input id="rx-doctor-filter" placeholder="Filter by doctor..." oninput="debounceRxSearch()" style="width:180px">
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>ID</th><th>User</th><th>Medication</th><th>Dosage</th>
        <th>Frequency</th><th>Doctor</th><th>Active</th><th>Dates</th><th>Actions</th>
      </tr></thead>
      <tbody id="rxs-tbody"><tr><td colspan="9" class="empty">Loading...</td></tr></tbody>
    </table>
  </div>
  <div class="pager" id="rxs-pager"></div>
</div>

</main>

<!-- Modal -->
<div id="overlay" onclick="closeModal(event)">
  <div id="mbox" onclick="event.stopPropagation()">
    <h2 id="m-title">Title</h2>
    <div id="m-body"></div>
    <div class="mfooter">
      <button class="btn btn-g" onclick="hideModal()">Cancel</button>
      <button class="btn btn-p" id="m-save" onclick="submitModal()">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const BASE = '';  // same origin
let TOKEN = null;
let modalAction = null;

const state = {
  users: { page:1, size:20, pages:1, total:0 },
  meds:  { page:1, size:20, pages:1, total:0, q:'' },
  rxs:   { page:1, size:20, pages:1, total:0 },
  lookupUsers: [],
  lookupMeds: [],
};

// ── API ─────────────────────────────────────────────────────────────────────

async function api(method, path, body) {
  const h = {'Content-Type':'application/json'};
  if (TOKEN) h['Authorization'] = 'Bearer ' + TOKEN;
  const r = await fetch(BASE + path, {method, headers:h, body: body ? JSON.stringify(body) : undefined});
  if (r.status === 204) return null;
  const d = await r.json();
  if (!r.ok) {
    const msg = d?.error?.message || d?.detail || `HTTP ${r.status}`;
    throw new Error(msg);
  }
  return d;
}

// ── Init ─────────────────────────────────────────────────────────────────────

async function init() {
  setStatus('wait', 'Connecting...');
  try {
    const d = await api('POST', '/api/v1/auth/login',
      {login_name:'admin', password:'Admin123456!'});
    TOKEN = d.access_token;
    setStatus('ok', 'Connected (admin)');
    await loadLookups();
    showTab('users');
  } catch(e) {
    setStatus('err', 'Connection failed');
    toast('Cannot reach backend at ' + location.origin, 'err');
  }
}

// ── Status ───────────────────────────────────────────────────────────────────

function setStatus(cls, text) {
  const el = document.getElementById('conn-status');
  el.className = cls === 'ok' ? '' : cls;
  el.textContent = text;
}

// ── Tabs ─────────────────────────────────────────────────────────────────────

function showTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const names = ['users','meds','rxs'];
    t.classList.toggle('on', names[i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  document.getElementById('panel-' + name).classList.add('on');
  if (name === 'users') loadUsers();
  if (name === 'meds')  loadMeds();
  if (name === 'rxs')   loadRxs();
}

// ── Lookups ───────────────────────────────────────────────────────────────────

async function loadLookups() {
  try {
    const [u, m] = await Promise.all([
      api('GET', '/api/v1/lookups/users'),
      api('GET', '/api/v1/lookups/medications'),
    ]);
    state.lookupUsers = u;
    state.lookupMeds = m;
    // populate rx user filter dropdown
    const sel = document.getElementById('rx-user-filter');
    sel.innerHTML = '<option value="">All Users</option>';
    u.forEach(u2 => {
      const o = document.createElement('option');
      o.value = u2.user_id; o.textContent = u2.user_name + ' (' + u2.login_name + ')';
      sel.appendChild(o);
    });
  } catch(e) { /* non-fatal */ }
}

// ── USERS ─────────────────────────────────────────────────────────────────────

async function loadUsers(page) {
  if (page) state.users.page = page;
  const showInactive = document.getElementById('show-inactive-users').checked;
  try {
    const d = await api('GET', `/api/v1/users?page=${state.users.page}&size=${state.users.size}`);
    Object.assign(state.users, {pages:d.pages, total:d.total});
    let items = d.items;
    if (!showInactive) items = items.filter(u => u.is_active);
    renderUsers(items, d.total);
    renderPager('users-pager', state.users, loadUsers);
  } catch(e) { toast(e.message, 'err'); }
}

function renderUsers(items, total) {
  const tb = document.getElementById('users-tbody');
  if (!items.length) { tb.innerHTML = '<tr><td colspan="7" class="empty">No users found</td></tr>'; return; }
  tb.innerHTML = items.map(u => `
    <tr>
      <td>${u.user_id}</td>
      <td>${esc(u.user_name)}</td>
      <td><code style="font-size:.82rem">${esc(u.login_name)}</code></td>
      <td>${esc(u.email)}</td>
      <td><span class="badge ${u.role==='admin'?'bg-admin':'bg-normal'}">${u.role}</span></td>
      <td><span class="badge ${u.is_active?'bg-ok':'bg-off'}">${u.is_active?'active':'inactive'}</span></td>
      <td><div class="acts">
        <button class="btn btn-g btn-sm" onclick="openEditUser(${u.user_id})">Edit</button>
        <button class="btn btn-w btn-sm" onclick="softDeleteUser(${u.user_id},'${esc(u.user_name)}')">Deactivate</button>
        <button class="btn btn-d btn-sm" onclick="hardDeleteUser(${u.user_id},'${esc(u.user_name)}')">Delete</button>
      </div></td>
    </tr>`).join('');
}

function openCreateUser() {
  modalAction = async () => {
    const d = getFormData('user-form');
    if (!d.password) { toast('Password required', 'err'); return; }
    await api('POST', '/api/v1/users', d);
    toast('User created', 'ok'); hideModal(); loadUsers(); loadLookups();
  };
  showModal('Create User', userForm({}));
}

async function openEditUser(id) {
  try {
    const u = await api('GET', `/api/v1/users/${id}`);
    modalAction = async () => {
      const d = getFormData('user-form');
      delete d.password;
      await api('PATCH', `/api/v1/users/${id}`, d);
      toast('User updated', 'ok'); hideModal(); loadUsers();
    };
    showModal('Edit User', userForm(u));
  } catch(e) { toast(e.message, 'err'); }
}

async function softDeleteUser(id, name) {
  if (!confirm(`Deactivate user "${name}"?`)) return;
  try { await api('DELETE', `/api/v1/users/${id}`); toast('User deactivated', 'ok'); loadUsers(); loadLookups(); }
  catch(e) { toast(e.message, 'err'); }
}

async function hardDeleteUser(id, name) {
  if (!confirm(`HARD DELETE user "${name}"?\n\nThis is permanent and will fail if they have prescriptions.`)) return;
  try { await api('DELETE', `/api/v1/users/${id}?hard=true`); toast('User deleted', 'ok'); loadUsers(); loadLookups(); }
  catch(e) { toast(e.message, 'err'); }
}

function userForm(u) {
  return `<form id="user-form">
    <div class="fr2">
      <div class="fr"><label>Login Name *</label><input name="login_name" value="${esc(u.login_name||'')}" required></div>
      <div class="fr"><label>Display Name *</label><input name="user_name" value="${esc(u.user_name||'')}" required></div>
    </div>
    <div class="fr"><label>Email *</label><input name="email" type="email" value="${esc(u.email||'')}" required></div>
    <div class="fr2">
      <div class="fr"><label>Password ${u.user_id?'(leave blank to keep)':' *'}</label><input name="password" type="password" autocomplete="new-password"></div>
      <div class="fr"><label>Role</label>
        <select name="role">
          <option value="normal" ${(u.role||'normal')==='normal'?'selected':''}>normal</option>
          <option value="admin" ${u.role==='admin'?'selected':''}>admin</option>
        </select>
      </div>
    </div>
  </form>`;
}

// ── MEDICATIONS ───────────────────────────────────────────────────────────────

let medSearchTimer;
function debounceSearch() {
  clearTimeout(medSearchTimer);
  medSearchTimer = setTimeout(() => { state.meds.q = document.getElementById('med-search').value; loadMeds(1); }, 300);
}

async function loadMeds(page) {
  if (page) state.meds.page = page;
  const q = state.meds.q ? `&q=${encodeURIComponent(state.meds.q)}` : '';
  try {
    const d = await api('GET', `/api/v1/medications?page=${state.meds.page}&size=${state.meds.size}${q}`);
    Object.assign(state.meds, {pages:d.pages, total:d.total});
    renderMeds(d.items);
    renderPager('meds-pager', state.meds, loadMeds);
  } catch(e) { toast(e.message, 'err'); }
}

function renderMeds(items) {
  const tb = document.getElementById('meds-tbody');
  if (!items.length) { tb.innerHTML = '<tr><td colspan="7" class="empty">No medications found</td></tr>'; return; }
  tb.innerHTML = items.map(m => `
    <tr>
      <td>${m.medication_id}</td>
      <td><strong>${esc(m.medication_name)}</strong></td>
      <td>${esc(m.generic_name||'—')}</td>
      <td>${esc(m.strength||'—')}</td>
      <td>${esc(m.form||'—')}</td>
      <td>${esc(m.brand_name||'—')}</td>
      <td><div class="acts">
        <button class="btn btn-g btn-sm" onclick="openEditMed(${m.medication_id})">Edit</button>
      </div></td>
    </tr>`).join('');
}

function openCreateMed() {
  modalAction = async () => {
    const d = getFormData('med-form');
    await api('POST', '/api/v1/medications', d);
    toast('Medication created', 'ok'); hideModal(); loadMeds(); loadLookups();
  };
  showModal('Create Medication', medForm({}));
}

async function openEditMed(id) {
  try {
    const m = await api('GET', `/api/v1/medications/${id}`);
    modalAction = async () => {
      const d = getFormData('med-form');
      await api('PATCH', `/api/v1/medications/${id}`, d);
      toast('Medication updated', 'ok'); hideModal(); loadMeds(); loadLookups();
    };
    showModal('Edit Medication', medForm(m));
  } catch(e) { toast(e.message, 'err'); }
}

function medForm(m) {
  return `<form id="med-form">
    <div class="fr"><label>Medication Name *</label><input name="medication_name" value="${esc(m.medication_name||'')}" required></div>
    <div class="fr2">
      <div class="fr"><label>Generic Name</label><input name="generic_name" value="${esc(m.generic_name||'')}"></div>
      <div class="fr"><label>Brand Name</label><input name="brand_name" value="${esc(m.brand_name||'')}"></div>
    </div>
    <div class="fr2">
      <div class="fr"><label>Strength</label><input name="strength" value="${esc(m.strength||'')}" placeholder="e.g. 500mg"></div>
      <div class="fr"><label>Form</label>
        <select name="form">
          <option value="">—</option>
          ${['tablet','capsule','liquid','patch','inhaled','injection','topical','other']
            .map(f => `<option value="${f}" ${m.form===f?'selected':''}>${f}</option>`).join('')}
        </select>
      </div>
    </div>
  </form>`;
}

// ── PRESCRIPTIONS ─────────────────────────────────────────────────────────────

let rxSearchTimer;
function debounceRxSearch() {
  clearTimeout(rxSearchTimer);
  rxSearchTimer = setTimeout(() => loadRxs(1), 300);
}

async function loadRxs(page) {
  if (page) state.rxs.page = page;
  const uid = document.getElementById('rx-user-filter').value;
  const active = document.getElementById('rx-active-filter').value;
  const doctor = document.getElementById('rx-doctor-filter').value;
  let qs = `page=${state.rxs.page}&size=${state.rxs.size}`;
  if (uid) qs += `&user_id=${uid}`;
  if (active !== '') qs += `&active=${active}`;
  if (doctor) qs += `&doctor=${encodeURIComponent(doctor)}`;
  try {
    const d = await api('GET', `/api/v1/prescriptions?${qs}`);
    Object.assign(state.rxs, {pages:d.pages, total:d.total});
    renderRxs(d.items);
    renderPager('rxs-pager', state.rxs, loadRxs);
  } catch(e) { toast(e.message, 'err'); }
}

function rxUserName(user_id) {
  const u = state.lookupUsers.find(u => u.user_id === user_id);
  return u ? u.user_name : `#${user_id}`;
}

function renderRxs(items) {
  const tb = document.getElementById('rxs-tbody');
  if (!items.length) { tb.innerHTML = '<tr><td colspan="9" class="empty">No prescriptions found</td></tr>'; return; }
  tb.innerHTML = items.map(r => {
    const dates = [r.start_date, r.end_date].filter(Boolean).join(' → ') || '—';
    return `<tr>
      <td>${r.prescription_id}</td>
      <td>${esc(rxUserName(r.user_id))}</td>
      <td><strong>${esc(r.medication?.medication_name||'')}</strong></td>
      <td>${esc(r.dosage||'—')}</td>
      <td>${esc(r.frequency||'—')}</td>
      <td>${esc(r.doctor||'—')}</td>
      <td><span class="badge ${r.is_active?'bg-ok':'bg-off'}">${r.is_active?'active':'inactive'}</span></td>
      <td style="font-size:.77rem;color:var(--muted)">${dates}</td>
      <td><div class="acts">
        <button class="btn btn-g btn-sm" onclick="openEditRx(${r.prescription_id})">Edit</button>
        <button class="btn btn-w btn-sm" onclick="softDeleteRx(${r.prescription_id})">Deactivate</button>
        <button class="btn btn-d btn-sm" onclick="hardDeleteRx(${r.prescription_id})">Delete</button>
      </div></td>
    </tr>`;
  }).join('');
}

function openCreateRx() {
  modalAction = async () => {
    const d = getFormData('rx-form');
    // convert empty strings to null for optional fields
    Object.keys(d).forEach(k => { if (d[k] === '') d[k] = null; });
    d.user_id = parseInt(d.user_id);
    d.medication_id = parseInt(d.medication_id);
    if (d.quantity) d.quantity = parseInt(d.quantity);
    if (d.refills_remaining) d.refills_remaining = parseInt(d.refills_remaining);
    d.is_active = d.is_active === 'true' || d.is_active === true;
    await api('POST', '/api/v1/prescriptions', d);
    toast('Prescription created', 'ok'); hideModal(); loadRxs(); loadLookups();
  };
  showModal('Create Prescription', rxForm({}));
}

async function openEditRx(id) {
  try {
    const r = await api('GET', `/api/v1/prescriptions/${id}`);
    modalAction = async () => {
      const d = getFormData('rx-form');
      Object.keys(d).forEach(k => { if (d[k] === '') d[k] = null; });
      if (d.medication_id) d.medication_id = parseInt(d.medication_id);
      if (d.quantity) d.quantity = parseInt(d.quantity);
      if (d.refills_remaining) d.refills_remaining = parseInt(d.refills_remaining);
      d.is_active = d.is_active === 'true' || d.is_active === true;
      await api('PATCH', `/api/v1/prescriptions/${id}`, d);
      toast('Prescription updated', 'ok'); hideModal(); loadRxs();
    };
    showModal('Edit Prescription', rxForm(r));
  } catch(e) { toast(e.message, 'err'); }
}

async function softDeleteRx(id) {
  if (!confirm('Mark this prescription as inactive?')) return;
  try { await api('DELETE', `/api/v1/prescriptions/${id}`); toast('Deactivated', 'ok'); loadRxs(); }
  catch(e) { toast(e.message, 'err'); }
}

async function hardDeleteRx(id) {
  if (!confirm('Permanently DELETE this prescription?')) return;
  try { await api('DELETE', `/api/v1/prescriptions/${id}?hard=true`); toast('Deleted', 'ok'); loadRxs(); }
  catch(e) { toast(e.message, 'err'); }
}

function rxForm(r) {
  const userOpts = state.lookupUsers.map(u =>
    `<option value="${u.user_id}" ${r.user_id===u.user_id?'selected':''}>${esc(u.user_name)} (${esc(u.login_name)})</option>`).join('');
  const medOpts = state.lookupMeds.map(m =>
    `<option value="${m.medication_id}" ${r.medication_id===m.medication_id?'selected':''}>${esc(m.medication_name)}</option>`).join('');
  return `<form id="rx-form">
    <div class="fr2">
      <div class="fr"><label>User *</label>
        <select name="user_id" required ${r.prescription_id?'disabled':''}>
          <option value="">Select user...</option>${userOpts}
        </select>
        ${r.prescription_id ? `<input type="hidden" name="user_id" value="${r.user_id}">` : ''}
      </div>
      <div class="fr"><label>Medication *</label>
        <select name="medication_id" required>
          <option value="">Select medication...</option>${medOpts}
        </select>
      </div>
    </div>
    <div class="fr2">
      <div class="fr"><label>Dosage</label><input name="dosage" value="${esc(r.dosage||'')}" placeholder="e.g. 10mg"></div>
      <div class="fr"><label>Frequency</label><input name="frequency" value="${esc(r.frequency||'')}" placeholder="e.g. twice daily"></div>
    </div>
    <div class="fr2">
      <div class="fr"><label>Doctor</label><input name="doctor" value="${esc(r.doctor||'')}"></div>
      <div class="fr"><label>Status</label>
        <select name="is_active">
          <option value="true" ${r.is_active!==false?'selected':''}>Active</option>
          <option value="false" ${r.is_active===false?'selected':''}>Inactive</option>
        </select>
      </div>
    </div>
    <hr>
    <div class="sec">Clinical Details</div>
    <div class="fr2">
      <div class="fr"><label>Prescribed Date</label><input name="prescribed_date" type="date" value="${r.prescribed_date||''}"></div>
      <div class="fr"><label>Route</label>
        <select name="route">
          <option value="">—</option>
          ${['oral','topical','injection','inhaled','patch','other']
            .map(v=>`<option value="${v}" ${r.route===v?'selected':''}>${v}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="fr2">
      <div class="fr"><label>Start Date</label><input name="start_date" type="date" value="${r.start_date||''}"></div>
      <div class="fr"><label>End Date</label><input name="end_date" type="date" value="${r.end_date||''}"></div>
    </div>
    <div class="fr2">
      <div class="fr"><label>Quantity</label><input name="quantity" type="number" min="0" value="${r.quantity??''}"></div>
      <div class="fr"><label>Refills Remaining</label><input name="refills_remaining" type="number" min="0" value="${r.refills_remaining??''}"></div>
    </div>
    <div class="fr"><label>Reason / Indication</label><input name="reason" value="${esc(r.reason||'')}"></div>
    <div class="fr"><label>Pharmacy</label><input name="pharmacy" value="${esc(r.pharmacy||'')}"></div>
    <div class="fr"><label>Notes</label><textarea name="notes">${esc(r.notes||'')}</textarea></div>
  </form>`;
}

// ── Modal ─────────────────────────────────────────────────────────────────────

function showModal(title, html) {
  document.getElementById('m-title').textContent = title;
  document.getElementById('m-body').innerHTML = html;
  document.getElementById('overlay').classList.add('on');
  const first = document.querySelector('#mbox input, #mbox select');
  if (first) setTimeout(() => first.focus(), 50);
}

function hideModal() {
  document.getElementById('overlay').classList.remove('on');
  modalAction = null;
}

function closeModal(e) { if (e.target === document.getElementById('overlay')) hideModal(); }

async function submitModal() {
  if (!modalAction) return;
  const btn = document.getElementById('m-save');
  btn.disabled = true; btn.textContent = 'Saving...';
  try { await modalAction(); }
  catch(e) { toast(e.message, 'err'); }
  finally { btn.disabled = false; btn.textContent = 'Save'; }
}

// ── Pagination ────────────────────────────────────────────────────────────────

function renderPager(id, s, loadFn) {
  const el = document.getElementById(id);
  if (s.pages <= 1) { el.innerHTML = `<span>${s.total} total</span>`; return; }
  const pages = Math.min(s.pages, 7);
  let btns = `<span>${s.total} total &nbsp;</span>`;
  btns += `<button ${s.page<=1?'disabled':''} onclick="${loadFn.name}(${s.page-1})">&lsaquo;</button>`;
  for (let i=1; i<=s.pages; i++) {
    if (s.pages > 7 && i > 3 && i < s.pages - 1 && Math.abs(i - s.page) > 1) {
      if (i === 4) btns += '<span>…</span>';
      continue;
    }
    btns += `<button class="${i===s.page?'cur':''}" onclick="${loadFn.name}(${i})">${i}</button>`;
  }
  btns += `<button ${s.page>=s.pages?'disabled':''} onclick="${loadFn.name}(${s.page+1})">&rsaquo;</button>`;
  el.innerHTML = btns;
}

// ── Toast ─────────────────────────────────────────────────────────────────────

function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `t-item t-${type==='ok'?'ok':type==='err'?'err':'info'}`;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// ── Utils ─────────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getFormData(formId) {
  const fd = new FormData(document.getElementById(formId));
  const obj = {};
  fd.forEach((v, k) => { obj[k] = v; });
  return obj;
}

// ── Boot ──────────────────────────────────────────────────────────────────────

init();
</script>
